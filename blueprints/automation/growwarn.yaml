                  target:
                    entity_id: input_text.growwarn_gh1_temp
                  data:
                    value: "ok_since={{ as_timestamp(now()) | round(0) }}"

            # ACK-Latch – bleibt bis Reset
            # (Reset erfolgt weiter unten nach reset_for)

