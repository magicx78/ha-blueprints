                            data:
                              media_player_entity_id: >
                                {{ v_tts_target if (repeat.item == 'tts.speak' and v_tts_entity != '') else '' }}
                              message: >
                                Erinnerung: {{ v_gh1_name }}: Temperatur
                                {{ 'immer noch zu niedrig' if gh1_temp_low else 'immer noch zu hoch' }}.

