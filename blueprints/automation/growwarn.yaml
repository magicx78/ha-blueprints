                                {% if v_bin_en and v_bin_sensor != '' %}
                                | {{ v_bin_status_text }}{% endif %}
                              data:
                                push:
                                  sound:
                                    name: "default"
                                    critical: 1
                                    volume: 1.0
                                actions:
                                  - action: "ACK_GH1_HUM"
                                    title: "✅ Bestätigen"
                - if:
