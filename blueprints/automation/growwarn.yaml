        # ────────────────────────────────────────────────────────────────────
        #  GH1 – Luftfeuchte (identische Logik)
        # ────────────────────────────────────────────────────────────────────
        - variables:
            latch_gh1_hum: "{{ states('input_text.growwarn_gh1_hum') }}"
            val_gh1_hum:   "{{ states(v_gh1_hum) | float(none) }}"
            out_gh1_hum: >
              {{ val_gh1_hum is not none
                 and (val_gh1_hum < v_gh1_hmin or val_gh1_hum > v_gh1_hmax) }}
            gh1_hum_low: >
              {{ val_gh1_hum is not none and val_gh1_hum < v_gh1_hmin }}

        - variables:
            gh1_hum_out_since: >
              {% set raw = latch_gh1_hum %}
              {% if raw.startswith('out_since=') %}
                {{ raw.split('=')[1].split('|')[0] | float(0) }}
              {% else %}0{% endif %}
            gh1_hum_ok_since: >
              {% set raw = latch_gh1_hum %}
              {% if raw.startswith('ok_since=') %}
                {{ raw.split('=')[1].split('|')[0] | float(0) }}
              {% else %}0{% endif %}
            gh1_hum_state: >
              {% set raw = latch_gh1_hum %}
              {% if raw.startswith('out_since=') %}   warned_candidate
              {% elif raw.startswith('warned') %}      warned
              {% elif raw.startswith('ack') %}         ack
              {% elif raw.startswith('ok_since=') %}   ok_candidate
              {% else %}                               idle
              {% endif %}
            gh1_hum_last_repeat: >
              {% set raw = latch_gh1_hum %}
              {% if '|repeat=' in raw %}
                {{ raw.split('|repeat=')[1] | float(0) }}
              {% else %}0{% endif %}

        - choose:
            - conditions:
                - condition: template
                  value_template: "{{ out_gh1_hum and gh1_hum_state == 'idle' }}"
              sequence:
                - service: input_text.set_value
                  target:
                    entity_id: input_text.growwarn_gh1_hum
                  data:
                    value: "out_since={{ as_timestamp(now()) | round(0) }}"

