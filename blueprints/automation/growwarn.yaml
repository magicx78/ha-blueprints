                - conditions:
                    - condition: template
                      value_template: "{{ age_gh3_temp < v_stale_sec and latch_gh3_ts == 'stale_warned' }}"
                  sequence:
                    - service: input_text.set_value
                      target:
                        entity_id: input_text.growwarn_gh3_temp_stale
                      data:
                        value: "idle"

        - if:
            - condition: template
              value_template: "{{ v_stale_en and v_gh3_en and v_gh3_hum != '' }}"
          then:
            - variables:
                latch_gh3_hs: "{{ states('input_text.growwarn_gh3_hum_stale') }}"
                age_gh3_hum_s: >
                  {{ (as_timestamp(now())
                      - as_timestamp(states[v_gh3_hum].last_reported
                        if states[v_gh3_hum].last_reported is defined
                        else states[v_gh3_hum].last_updated) | float(0))
                     if v_gh3_hum != '' and states[v_gh3_hum] is defined else 9999 }}
            - choose:
                - conditions:
                    - condition: template
                      value_template: "{{ age_gh3_hum_s >= v_stale_sec and latch_gh3_hs != 'stale_warned' }}"
                  sequence:
                    - service: input_text.set_value
                      target:
                        entity_id: input_text.growwarn_gh3_hum_stale
                      data:
                        value: "stale_warned"
                    - if:
                        - condition: template
                          value_template: "{{ v_notify_en }}"
                      then:
                        - repeat:
                            for_each: !input notify_targets
                            sequence:
                              - service: "{{ repeat.item }}"
                                data:
                                  title: "📡 GrowWarn – {{ v_gh3_name }} Sensor offline"
                                  message: >
                                    Luftfeuchtesensor seit
                                    {{ (age_gh3_hum_s / 60) | round(0) }} Minuten ohne Update!
                - conditions:
                    - condition: template
                      value_template: "{{ age_gh3_hum_s < v_stale_sec and latch_gh3_hs == 'stale_warned' }}"
                  sequence:
                    - service: input_text.set_value
                      target:
                        entity_id: input_text.growwarn_gh3_hum_stale
                      data:
                        value: "idle"

    # ════════════════════════════════════════════════════════════════════════
    #  CASE 2: ACK – Notification Action vom iOS Gerät
    # ════════════════════════════════════════════════════════════════════════
    - conditions:
        - condition: trigger
          id: "ack_action"
      sequence:
        - choose:

            # ── ACK GH1 Temp ──────────────────────────────────────────────
            - conditions:
                - condition: template
                  value_template: "{{ v_ack_action == 'ACK_GH1_TEMP' }}"
              sequence:
                - service: input_text.set_value
                  target:
                    entity_id: input_text.growwarn_gh1_temp
                  data:
                    value: "ack|ts={{ as_timestamp(now()) | round(0) }}"
                - if:
                    - condition: template
                      value_template: "{{ v_thanks_en and v_notify_en }}"
                  then:
                    - repeat:
                        for_each: !input notify_targets
                        sequence:
                          - service: "{{ repeat.item }}"
                            data:
                              title: "👍 GrowWarn – {{ v_gh1_name }} quittiert"
                              message: >
                                Temperaturwarnung bestätigt.
                                Nächste Meldung erst nach Reset ({{ v_reset_for.minutes | default(5) }} Min. Normalbereich).

            # ── ACK GH1 Hum ───────────────────────────────────────────────
            - conditions:
                - condition: template
                  value_template: "{{ v_ack_action == 'ACK_GH1_HUM' }}"
              sequence:
                - service: input_text.set_value
                  target:
                    entity_id: input_text.growwarn_gh1_hum
                  data:
                    value: "ack|ts={{ as_timestamp(now()) | round(0) }}"
                - if:
                    - condition: template
                      value_template: "{{ v_thanks_en and v_notify_en }}"
                  then:
                    - repeat:
                        for_each: !input notify_targets
                        sequence:
                          - service: "{{ repeat.item }}"
                            data:
                              title: "👍 GrowWarn – {{ v_gh1_name }} quittiert"
                              message: "Luftfeuchtewarnung bestätigt."

            # ── ACK GH2 Temp ──────────────────────────────────────────────
            - conditions:
                - condition: template
                  value_template: "{{ v_ack_action == 'ACK_GH2_TEMP' }}"
              sequence:
                - service: input_text.set_value
                  target:
                    entity_id: input_text.growwarn_gh2_temp
                  data:
                    value: "ack|ts={{ as_timestamp(now()) | round(0) }}"
                - if:
                    - condition: template
                      value_template: "{{ v_thanks_en and v_notify_en }}"
                  then:
                    - repeat:
                        for_each: !input notify_targets
                        sequence:
                          - service: "{{ repeat.item }}"
                            data:
                              title: "👍 GrowWarn – {{ v_gh2_name }} quittiert"
                              message: "Temperaturwarnung bestätigt."

            # ── ACK GH2 Hum ───────────────────────────────────────────────
            - conditions:
                - condition: template
                  value_template: "{{ v_ack_action == 'ACK_GH2_HUM' }}"
              sequence:
                - service: input_text.set_value
                  target:
                    entity_id: input_text.growwarn_gh2_hum
                  data:
                    value: "ack|ts={{ as_timestamp(now()) | round(0) }}"
                - if:
                    - condition: template
                      value_template: "{{ v_thanks_en and v_notify_en }}"
                  then:
                    - repeat:
                        for_each: !input notify_targets
                        sequence:
                          - service: "{{ repeat.item }}"
                            data:
                              title: "👍 GrowWarn – {{ v_gh2_name }} quittiert"
                              message: "Luftfeuchtewarnung bestätigt."

            # ── ACK GH3 Temp ──────────────────────────────────────────────
            - conditions:
                - condition: template
                  value_template: "{{ v_ack_action == 'ACK_GH3_TEMP' }}"
              sequence:
                - service: input_text.set_value
                  target:
                    entity_id: input_text.growwarn_gh3_temp
                  data:
                    value: "ack|ts={{ as_timestamp(now()) | round(0) }}"
                - if:
                    - condition: template
                      value_template: "{{ v_thanks_en and v_notify_en }}"
                  then:
                    - repeat:
                        for_each: !input notify_targets
                        sequence:
                          - service: "{{ repeat.item }}"
                            data:
                              title: "👍 GrowWarn – {{ v_gh3_name }} quittiert"
                              message: "Temperaturwarnung bestätigt."

            # ── ACK GH3 Hum ───────────────────────────────────────────────
            - conditions:
                - condition: template
                  value_template: "{{ v_ack_action == 'ACK_GH3_HUM' }}"
              sequence:
                - service: input_text.set_value
                  target:
                    entity_id: input_text.growwarn_gh3_hum
                  data:
                    value: "ack|ts={{ as_timestamp(now()) | round(0) }}"
                - if:
                    - condition: template
                      value_template: "{{ v_thanks_en and v_notify_en }}"
                  then:
                    - repeat:
                        for_each: !input notify_targets
                        sequence:
                          - service: "{{ repeat.item }}"
                            data:
                              title: "👍 GrowWarn – {{ v_gh3_name }} quittiert"
                              message: "Luftfeuchtewarnung bestätigt."

        # Nach ACK: Latch verbleibt auf 'ack' bis reset_for im Normalbereich
        # (Poll-Loop erkennt 'ack' State und behandelt Reset wie 'warned':
        #  setzt ok_since → wartet reset_for → idle)
        # Wichtig: im Poll-Block wurde 'ack' bewusst NICHT auf ok_since gesetzt
        # um den ACK zu respektieren. Die nächste poll-Iteration nach dem Wert-
        # Normalbereich setzt ok_since, dann nach reset_for → idle.
        # Erweiterung für ACK → ok_since Übergang:
        - variables:
            gh1_temp_ack_raw: "{{ states('input_text.growwarn_gh1_temp') }}"
            gh1_hum_ack_raw:  "{{ states('input_text.growwarn_gh1_hum') }}"
            gh2_temp_ack_raw: "{{ states('input_text.growwarn_gh2_temp') }}"
            gh2_hum_ack_raw:  "{{ states('input_text.growwarn_gh2_hum') }}"
            gh3_temp_ack_raw: "{{ states('input_text.growwarn_gh3_temp') }}"
            gh3_hum_ack_raw:  "{{ states('input_text.growwarn_gh3_hum') }}"

    # ════════════════════════════════════════════════════════════════════════
    #  CASE 3: Binärsensor – Zustandsänderung (Tür auf/zu)
    # ════════════════════════════════════════════════════════════════════════
    - conditions:
        - condition: trigger
          id: "binary_change"
        - condition: template
          value_template: "{{ v_bin_en and v_bin_sensor != '' }}"
      sequence:
        - variables:
            bin_new_state:  "{{ trigger.to_state.state }}"
            bin_is_now_open: "{{ bin_new_state == v_bin_open_state }}"

        - choose:
            # Tür / Sensor GEÖFFNET
            - conditions:
                - condition: template
                  value_template: "{{ bin_is_now_open }}"
              sequence:
                - if:
                    - condition: template
                      value_template: "{{ v_notify_en }}"
                  then:
                    - repeat:
                        for_each: !input notify_targets
                        sequence:
                          - service: "{{ repeat.item }}"
                            data:
                              title: "🚪 GrowWarn – {{ v_bin_name }} geöffnet"
                              message: "{{ v_bin_name }} wurde geöffnet."
                              data:
                                push:
                                  sound:
                                    name: "default"
                - if:
                    - condition: template
                      value_template: "{{ v_tts_en and not v_in_quiet and v_tts_target != '' }}"
                  then:
                    - repeat:
                        for_each: !input tts_service
                        sequence:
                          - service: "{{ repeat.item }}"
                            target:
                              entity_id: >
                                {{ v_tts_entity if (repeat.item == 'tts.speak' and v_tts_entity != '') else v_tts_target }}
                            data:
                              media_player_entity_id: >
                                {{ v_tts_target if (repeat.item == 'tts.speak' and v_tts_entity != '') else '' }}
                              message: "{{ v_bin_name }} wurde geöffnet."
                # Custom Aktion bei Öffnen
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "true"
                      sequence: !input binary_action_open

                # Timer-Warnung: nach binary_timer_minutes noch offen?
                # Implementierung via input_text Latch + poll
                - if:
                    - condition: template
                      value_template: "{{ v_bin_timer_min > 0 }}"
                  then:
                    - service: input_text.set_value
                      target:
                        entity_id: input_text.growwarn_binary_latch
                      data:
                        value: "open_since={{ as_timestamp(now()) | round(0) }}"

            # Tür / Sensor GESCHLOSSEN
            - conditions:
                - condition: template
                  value_template: "{{ not bin_is_now_open }}"
              sequence:
                - if:
                    - condition: template
                      value_template: "{{ v_notify_en }}"
                  then:
                    - repeat:
                        for_each: !input notify_targets
                        sequence:
                          - service: "{{ repeat.item }}"
                            data:
                              title: "🚪 GrowWarn – {{ v_bin_name }} geschlossen"
                              message: "{{ v_bin_name }} wurde geschlossen."
                              data:
                                push:
                                  sound:
                                    name: "default"
                - if:
                    - condition: template
                      value_template: "{{ v_tts_en and not v_in_quiet and v_tts_target != '' }}"
                  then:
                    - repeat:
                        for_each: !input tts_service
                        sequence:
                          - service: "{{ repeat.item }}"
                            target:
                              entity_id: >
                                {{ v_tts_entity if (repeat.item == 'tts.speak' and v_tts_entity != '') else v_tts_target }}
                            data:
                              media_player_entity_id: >
                                {{ v_tts_target if (repeat.item == 'tts.speak' and v_tts_entity != '') else '' }}
                              message: "{{ v_bin_name }} wurde geschlossen."
                # Custom Aktion bei Schließen
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "true"
                      sequence: !input binary_action_close
                # Timer-Latch zurücksetzen
                - service: input_text.set_value
                  target:
                    entity_id: input_text.growwarn_binary_latch
                  data:
                    value: "idle"

  # ── Poll: Binärsensor-Timer-Check (innerhalb poll-Trigger) ───────────────
  - if:
      - condition: trigger
        id: "poll"
      - condition: template
        value_template: >
          {{ v_bin_en and v_bin_sensor != ''
             and v_bin_timer_min > 0
             and v_bin_is_open }}
    then:
      - variables:
          bin_latch_raw: "{{ states('input_text.growwarn_binary_latch') }}"
          bin_open_since: >
            {% if bin_latch_raw.startswith('open_since=') %}
              {{ bin_latch_raw.split('=')[1] | float(0) }}
            {% else %}0{% endif %}
          bin_timer_sec: "{{ v_bin_timer_min * 60 }}"
          bin_open_elapsed: "{{ as_timestamp(now()) - bin_open_since }}"

      - choose:
          - conditions:
              - condition: template
                value_template: >
                  {{ bin_latch_raw.startswith('open_since=')
                     and bin_open_elapsed >= bin_timer_sec }}
            sequence:
              - service: input_text.set_value
                target:
                  entity_id: input_text.growwarn_binary_latch
                data:
                  value: "timer_warned"
              - if:
                  - condition: template
                    value_template: "{{ v_notify_en }}"
                then:
                  - repeat:
                      for_each: !input notify_targets
                      sequence:
                        - service: "{{ repeat.item }}"
                          data:
                            title: "⏱️ GrowWarn – {{ v_bin_name }} noch offen!"
                            message: >
                              {{ v_bin_name }} ist seit
                              {{ v_bin_timer_min }} Minuten geöffnet!
                            data:
                              push:
                                sound:
                                  name: "default"
                                  critical: 1
                                  volume: 1.0
              - if:
                  - condition: template
                    value_template: "{{ v_tts_en and not v_in_quiet and v_tts_target != '' }}"
                then:
                  - repeat:
                      for_each: !input tts_service
                      sequence:
                        - service: "{{ repeat.item }}"
                          target:
                            entity_id: >
                              {{ v_tts_entity if (repeat.item == 'tts.speak' and v_tts_entity != '') else v_tts_target }}
                          data:
                            media_player_entity_id: >
                              {{ v_tts_target if (repeat.item == 'tts.speak' and v_tts_entity != '') else '' }}
                            message: >
                              Achtung! {{ v_bin_name }} ist seit
                              {{ v_bin_timer_min }} Minuten noch geöffnet!

  # ── ACK: Latch 'ack' → ok_since sobald Wert wieder normal (Poll) ─────────
  # Diese Sektion verarbeitet den Übergang ack → ok_since im Poll-Trigger
  - if:
      - condition: trigger
        id: "poll"
    then:
      # GH1 Temp ACK-Reset
      - variables:
          _gh1t_raw:  "{{ states('input_text.growwarn_gh1_temp') }}"
          _gh1t_val:  "{{ states(v_gh1_temp) | float(none) }}"
          _gh1t_out:  >
            {{ _gh1t_val is not none
               and (_gh1t_val < v_gh1_tmin or _gh1t_val > v_gh1_tmax) }}
      - if:
          - condition: template
            value_template: >
              {{ _gh1t_raw.startswith('ack') and not _gh1t_out }}
        then:
          - service: input_text.set_value
            target:
              entity_id: input_text.growwarn_gh1_temp
            data:
              value: "ok_since={{ as_timestamp(now()) | round(0) }}"

      # GH1 Hum ACK-Reset
      - variables:
          _gh1h_raw:  "{{ states('input_text.growwarn_gh1_hum') }}"
          _gh1h_val:  "{{ states(v_gh1_hum) | float(none) }}"
          _gh1h_out:  >
            {{ _gh1h_val is not none
               and (_gh1h_val < v_gh1_hmin or _gh1h_val > v_gh1_hmax) }}
      - if:
          - condition: template
            value_template: >
              {{ _gh1h_raw.startswith('ack') and not _gh1h_out }}
        then:
          - service: input_text.set_value
            target:
              entity_id: input_text.growwarn_gh1_hum
            data:
              value: "ok_since={{ as_timestamp(now()) | round(0) }}"

      # GH2 Temp ACK-Reset (nur wenn aktiv)
      - if:
          - condition: template
            value_template: "{{ v_gh2_en and v_gh2_temp != '' }}"
        then:
          - variables:
              _gh2t_raw: "{{ states('input_text.growwarn_gh2_temp') }}"
              _gh2t_val: "{{ states(v_gh2_temp) | float(none) }}"
              _gh2t_out: >
                {{ _gh2t_val is not none
                   and (_gh2t_val < v_gh2_tmin or _gh2t_val > v_gh2_tmax) }}
          - if:
              - condition: template
                value_template: >
                  {{ _gh2t_raw.startswith('ack') and not _gh2t_out }}
            then:
              - service: input_text.set_value
                target:
                  entity_id: input_text.growwarn_gh2_temp
                data:
                  value: "ok_since={{ as_timestamp(now()) | round(0) }}"

      # GH2 Hum ACK-Reset
      - if:
          - condition: template
            value_template: "{{ v_gh2_en and v_gh2_hum != '' }}"
        then:
          - variables:
              _gh2h_raw: "{{ states('input_text.growwarn_gh2_hum') }}"
              _gh2h_val: "{{ states(v_gh2_hum) | float(none) }}"
              _gh2h_out: >
                {{ _gh2h_val is not none
                   and (_gh2h_val < v_gh2_hmin or _gh2h_val > v_gh2_hmax) }}
          - if:
              - condition: template
                value_template: >
                  {{ _gh2h_raw.startswith('ack') and not _gh2h_out }}
            then:
              - service: input_text.set_value
                target:
                  entity_id: input_text.growwarn_gh2_hum
                data:
                  value: "ok_since={{ as_timestamp(now()) | round(0) }}"

      # GH3 Temp ACK-Reset
      - if:
          - condition: template
            value_template: "{{ v_gh3_en and v_gh3_temp != '' }}"
        then:
          - variables:
              _gh3t_raw: "{{ states('input_text.growwarn_gh3_temp') }}"
              _gh3t_val: "{{ states(v_gh3_temp) | float(none) }}"
              _gh3t_out: >
                {{ _gh3t_val is not none
                   and (_gh3t_val < v_gh3_tmin or _gh3t_val > v_gh3_tmax) }}
          - if:
              - condition: template
                value_template: >
                  {{ _gh3t_raw.startswith('ack') and not _gh3t_out }}
            then:
              - service: input_text.set_value
                target:
                  entity_id: input_text.growwarn_gh3_temp
                data:
                  value: "ok_since={{ as_timestamp(now()) | round(0) }}"

      # GH3 Hum ACK-Reset
      - if:
          - condition: template
            value_template: "{{ v_gh3_en and v_gh3_hum != '' }}"
        then:
          - variables:
              _gh3h_raw: "{{ states('input_text.growwarn_gh3_hum') }}"
              _gh3h_val: "{{ states(v_gh3_hum) | float(none) }}"
              _gh3h_out: >
                {{ _gh3h_val is not none
                   and (_gh3h_val < v_gh3_hmin or _gh3h_val > v_gh3_hmax) }}
          - if:
              - condition: template
                value_template: >
                  {{ _gh3h_raw.startswith('ack') and not _gh3h_out }}
            then:
              - service: input_text.set_value
                target:
                  entity_id: input_text.growwarn_gh3_hum
                data:
                  value: "ok_since={{ as_timestamp(now()) | round(0) }}"

mode: queued
max: 10

# ═══════════════════════════════════════════════════════════════════════════
#  LATCH-ZUSTANDSMASCHINE  (Referenz)
# ═══════════════════════════════════════════════════════════════════════════
#
#  idle
#    │ Wert außerhalb
#    ▼
#  out_since=<ts>          ← Kandidat: Wert außerhalb, Frist läuft
#    │ trigger_for abgelaufen
#    ▼
#  warned|repeat=<ts>      ← Gewarnt (Repeat-Timestamp für Wiederholung)
#    │ User drückt ACK     │ Wert wieder normal
#    ▼                     ▼
#  ack|ts=<ts>          ok_since=<ts>
#    │ Wert normal            │ reset_for abgelaufen
#    ▼                        ▼
#  ok_since=<ts>           idle
#    │ reset_for abgelaufen
#    ▼
#  idle
#
#  Wiederholung (nur wenn repeat_enabled):
#    warned|repeat=<ts>  →  nach repeat_interval erneut warnen (kein ACK gesetzt)
#
# ═══════════════════════════════════════════════════════════════════════════
#  NOTIFY_TARGETS – Hinweis iOS
# ═══════════════════════════════════════════════════════════════════════════
#  Der 'target'-Selector im Blueprint wählt Entitäten/Geräte aus.
#  Für iOS Companion App lautet der Dienst:
#    notify.mobile_app_<geraetename>
#  Im Blueprint wird !input notify_targets als Liste übergeben und per
#  repeat: for_each iteriert. Stelle sicher, dass du als Ziel die
#  notify-Dienst-Entitäten (nicht Geräte-Entitäten) auswählst.
#
#  Falls der target-Selector keine notify-Dienste anzeigt, trage die
#  Dienstnamen alternativ direkt im Script-Editor ein:
#    - notify.mobile_app_iphone_max
#    - notify.mobile_app_ipad_wohnzimmer
# ═══════════════════════════════════════════════════════════════════════════
