                        sequence:
                          - service: "{{ repeat.item }}"
                            target:
                              entity_id: >
                                {{ v_tts_entity if (repeat.item == 'tts.speak' and v_tts_entity != '') else v_tts_target }}
                            data:
                              media_player_entity_id: >
                                {{ v_tts_target if (repeat.item == 'tts.speak' and v_tts_entity != '') else '' }}
                              message: >
                                Achtung! {{ v_gh1_name }}: Luftfeuchte
                                {{ 'zu niedrig' if gh1_hum_low else 'zu hoch' }}:
                                {{ val_gh1_hum | round(1) }} Prozent.

            - conditions:
                - condition: template
                  value_template: >
                    {{ out_gh1_hum and gh1_hum_state == 'warned'
                       and v_repeat_en
                       and (as_timestamp(now()) - gh1_hum_last_repeat) >= v_repeat_sec }}
              sequence:
                - service: input_text.set_value
                  target:
                    entity_id: input_text.growwarn_gh1_hum
                  data:
                    value: "warned|repeat={{ as_timestamp(now()) | round(0) }}"
                - if:
                    - condition: template
                      value_template: "{{ v_notify_en }}"
                  then:
                    - repeat:
                        for_each: !input notify_targets
                        sequence:
                          - service: "{{ repeat.item }}"
                            data:
                              title: "🔄 GrowWarn – {{ v_gh1_name }} (Wiederholung)"
                              message: >
                                💧 Luftfeuchte weiterhin
                                {{ '📉 zu trocken' if gh1_hum_low else '📈 zu feucht' }}:
                                {{ val_gh1_hum | round(1) }}%
                              data:
                                push:
                                  sound:
                                    name: "default"
                                actions:
                                  - action: "ACK_GH1_HUM"
                                    title: "✅ Bestätigen"
                - if:
                    - condition: template
                      value_template: "{{ v_tts_en and not v_in_quiet and v_tts_target != '' }}"
                  then:
                    - repeat:
                        for_each: !input tts_service
