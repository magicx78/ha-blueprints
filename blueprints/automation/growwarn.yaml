            - conditions:
                - condition: template
                  value_template: >
                    {{ not out_gh1_temp
                       and gh1_temp_state == 'ok_candidate'
                       and (as_timestamp(now()) - gh1_temp_ok_since) >= v_reset_sec }}
              sequence:
