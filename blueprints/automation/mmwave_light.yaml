# mmwave_light.yaml — Version 1.6.0 (2026-07-18)
blueprint:
  name: Blueprint mmWave Licht mit Lux, Anwesenheit, Timer und Bypass
  description: >
    Version 1.6.0 (2026-07-18) — mmWave, Bewegungsmelder, Tuerkontakte,
    Garagentore & Daemmerungssensor, alle optional.

    Lichtsteuerung mit optionalem mmWave-Praesenzsensor, optionalen
    Bewegungsmeldern, Tuerkontakten und Garagentoren, Luxwert,
    Daemmerungssensor, Anwesenheit, Ausschalt-Timer, Bypass und Sofort-An
    ohne Timer.

    Mindestens EINE Aktivitaetsquelle (mmWave-Sensor, Bewegungsmelder,
    Tuerkontakt oder Garagentor im passenden Modus) muss konfiguriert sein,
    sonst geht das Licht nie automatisch an.

    Das Licht schaltet nur ein, wenn jemand anwesend ist und es dunkel genug
    ist (Lux <= Schwellwert ODER ein Daemmerungssensor meldet Dunkelheit).
    Ueber den Sofort-An-Helfer kann das Licht unabhaengig von Dunkelheit und
    Anwesenheit eingeschaltet und vom automatischen Ausschalten ausgenommen
    werden. Ein Bypass-Helfer deaktiviert die Automation komplett.

    Optionale Eingaben (mmWave-Sensor, Bewegungsmelder, Tuerkontakte,
    Garagentore, Bypass-Helfer, Sofort-An-Helfer, Luxsensor,
    Daemmerungssensoren) koennen leer bleiben; dann verhaelt sich die
    Automation exakt wie ohne sie. Es gilt immer nur explizit aktive
    Zustaende; fehlende/leere/unknown/unavailable Entities blockieren nichts.

    Neu in 1.6.0:
    - Daemmerungssensor(en): neuer optionaler Eingang (Mehrfachauswahl;
      binary_sensor, input_boolean oder Zeitplan-Helfer; 'on' = dunkel).
      ODER-Verknuepfung mit dem Luxsensor: dunkel genug, wenn Lux <=
      Schwellwert ODER mindestens ein Daemmerungssensor an ist. Nicht
      konfigurierte bzw. unknown/unavailable Quellen zaehlen nicht; ist
      keine gueltige Quelle konfiguriert, bleibt die Dunkelheitspruefung
      wie bisher deaktiviert. Wird es dunkel (Sensor -> an), waehrend
      mmWave bereits Praesenz meldet, schaltet das Licht auch ohne neues
      Bewegungsevent ein (analog zum Lux-Trigger aus 1.3.0). Hellwerden
      (Sensor an -> aus) schaltet das Licht NICHT aktiv aus.

    Neu in 1.5.1:
    - Trigger-Haertung: mmWave-/Bewegungs-Ausschalt-Trigger feuern nur noch
      bei echten on->off-Uebergaengen. Geraete-Reconnects (unavailable ->
      off, z. B. nach WLAN-Ausfall oder HA-Neustart) starten keinen
      Ausschalt-Timer mehr. Garage-Trigger ignorieren analog Uebergaenge
      aus unknown/unavailable.
    - Multi-Helper-Fix: Sind mehrere Bypass- bzw. Sofort-An-Helfer
      konfiguriert, reagiert die Automation beim Ausschalten EINES Helfers
      nicht mehr, solange ein anderer Helfer derselben Gruppe noch an ist.

    Neu in 1.5.0:
    - Garagentore: neuer optionaler Eingang (Mehrfachauswahl) plus eigener
      Garagenmodus (ignorieren / Oeffnung schaltet ein / offen haelt Licht an).
      Unterstuetzt sowohl cover-Entities (Zustand open/opening/closed) als auch
      binary_sensor (on/off) — gedacht fuer Garagentore, die sich nicht als
      Tuerkontakt auswaehlen lassen. Als "offen" gelten on / open / opening.

    Neu in 1.4.0:
    - mmWave-Praesenzsensor ist jetzt optional und als Mehrfachauswahl
      umgesetzt (default []); leer lassen moeglich, wenn die Aktivitaet nur
      ueber Bewegungsmelder und/oder Tuerkontakte kommt. Bestehende Automationen
      mit einem einzelnen mmWave-Sensor funktionieren unveraendert weiter; falls
      das Feld im Editor nach dem Update leer erscheint, den Sensor einmal neu
      auswaehlen.

    Neu in 1.3.0:
    - Lux-Trigger: sinkt die Helligkeit unter den Schwellwert, waehrend der
      mmWave-Sensor bereits 'on' ist (stehende Praesenz, aber kein neues
      Bewegungsevent), schaltet das Licht jetzt automatisch ein. Damit geht
      das Licht bei Daemmerung auch dann an, wenn sich niemand bewegt. Der
      Trigger ist nur aktiv, wenn ein Luxsensor gesetzt und der Daemmerungswert
      groesser 0 ist; er beeinflusst laufende Ausschalt-Timer nicht.

    Neu in 1.2.0:
    - Lux-Robustheit: ein leerer oder unknown/unavailable Luxsensor deaktiviert
      die Luxpruefung automatisch, statt das Einschalten zu blockieren (analog
      zum presence_light-Blueprint). Ein separat gesetzter Daemmerungswert 0
      deaktiviert die Luxpruefung weiterhin ebenfalls.
    - Interne Aufraeumung: die zentrale Variable activity_active wird jetzt
      konsequent genutzt (reine Lesbarkeit, keine Verhaltensaenderung).

    Bewegungsmelder:
    - Optional (Mehrfachauswahl, device_class motion/occupancy).
    - Zaehlen als zusaetzliche Aktivitaet und verhindern das Ausschalten,
      solange mindestens einer 'on' ist.

    Tuerkontakte + Tuermodus:
    - Optional (Mehrfachauswahl, device_class door/opening/window).
    - door_mode 'none': Tuerkontakte werden komplett ignoriert.
    - door_mode 'trigger_on_open': Tueroeffnung kann das Licht einschalten,
      verhindert aber kein Ausschalten.
    - door_mode 'hold_while_open': solange mindestens ein Tuerkontakt offen ist,
      wird nicht ausgeschaltet.

    Garagentore + Garagenmodus:
    - Optional (Mehrfachauswahl). cover ODER binary_sensor.
    - Eigener Garagenmodus, unabhaengig vom Tuermodus.
    - garage_mode 'none': Garagentore werden ignoriert.
    - garage_mode 'trigger_on_open': Oeffnung kann das Licht einschalten,
      verhindert aber kein Ausschalten.
    - garage_mode 'hold_while_open': solange mindestens ein Garagentor offen ist,
      wird nicht ausgeschaltet (Oeffnung schaltet zusaetzlich ein).

    Bypass:
    - Optional (Mehrfachauswahl, input_boolean; normalerweise genau ein Helfer).
    - Wenn mindestens ein Bypass-Helfer 'on' ist, macht die Automation nichts.
    - Beim Ausschalten des Bypass wird die Automation neu bewertet:
      Wenn Aktivitaet vorhanden ist, wird ggf. eingeschaltet; wenn keine
      Aktivitaet vorhanden ist, wird ggf. ausgeschaltet.

    Weitere Hinweise:
    - Luxsensor leer / unknown / unavailable deaktiviert die Luxpruefung
      automatisch (Licht funktioniert dann unabhaengig von der Helligkeit).
      Der Daemmerungswert 0 deaktiviert die Luxpruefung ebenfalls.
    - Daemmerungssensoren: 'on' = dunkel, ein Sensor genuegt (ODER mit Lux).
      unknown/unavailable werden ignoriert; sind alle Sensoren ungueltig
      und ist kein Luxsensor aktiv, ist die Dunkelheitspruefung komplett
      deaktiviert.
    - Bypass und Sofort-An duerfen NICHT denselben Helfer verwenden
      (die Bedeutungen widersprechen sich).
    - Keinen vorhandenen Raum-Deaktivieren-Helper als Dummy missbrauchen,
      sonst werden andere Raeume versehentlich beeinflusst.
  domain: automation
  author: "magicx78"
  source_url: https://raw.githubusercontent.com/magicx78/ha-blueprints/main/blueprints/automation/mmwave_light.yaml
  homeassistant:
    min_version: "2024.10.0"

  input:
    mmwave_sensor:
      name: mmWave Präsenzsensor(en) (optional)
      description: >
        Optional. Binary Sensor(en) des mmWave-/Präsenzmelders (Mehrfachauswahl).
        Zählen als Aktivität und verhindern das Ausschalten, solange mindestens
        einer 'on' ist. Leer lassen, wenn kein mmWave-Sensor genutzt wird — dann
        muss aber mindestens eine andere Aktivitätsquelle (Bewegungsmelder oder
        Türkontakt im passenden Türmodus) konfiguriert sein, sonst geht das Licht
        nie automatisch an. Ein bereits konfigurierter einzelner Sensor bleibt
        gültig.
      default: []
      selector:
        entity:
          multiple: true
          domain: binary_sensor

    motion_sensors:
      name: Bewegungsmelder (optional)
      description: >
        Optional. Zusätzliche Bewegungs-/Belegungsmelder (Mehrfachauswahl).
        Zählen als zusätzliche Aktivität und verhindern das Ausschalten, solange
        mindestens einer 'on' ist. Leer lassen, wenn nicht benötigt.
      default: []
      selector:
        entity:
          multiple: true
          domain: binary_sensor
          device_class:
            - motion
            - occupancy

    door_sensors:
      name: Türkontakte (optional)
      description: >
        Optional. Tür-/Fensterkontakte (Mehrfachauswahl). Wirkung abhängig vom
        Türmodus. Nur explizit 'on' gilt als offen. Leer lassen, wenn nicht
        benötigt.
      default: []
      selector:
        entity:
          multiple: true
          domain: binary_sensor
          device_class:
            - door
            - opening
            - window

    door_mode:
      name: Türmodus
      description: >
        Steuert, wie Türkontakte wirken.
        "Türkontakte ignorieren": keinerlei Wirkung.
        "Türöffnung schaltet ein": Türöffnung ist ein Einschaltimpuls,
        verhindert aber kein Ausschalten.
        "Offen hält Licht an": solange mindestens ein Türkontakt offen ist,
        wird nicht ausgeschaltet (Türöffnung schaltet zusätzlich ein).
      default: "none"
      selector:
        select:
          mode: dropdown
          options:
            - label: "Türkontakte ignorieren"
              value: "none"
            - label: "Türöffnung schaltet ein"
              value: "trigger_on_open"
            - label: "Offen hält Licht an"
              value: "hold_while_open"

    garage_doors:
      name: Garagentor(e) (optional)
      description: >
        Optional. Garagentore als Sensor ODER Antrieb (Mehrfachauswahl).
        Unterstützt sowohl `cover`-Entities (Zustand offen/geschlossen) als auch
        `binary_sensor` (on/off) — geeignet für Garagentore, die sich nicht als
        Türkontakt auswählen lassen. Als "offen" gelten die Zustände on / open /
        opening. Wirkung abhängig vom Garagenmodus. Leer lassen, wenn nicht
        benötigt.
      default: []
      selector:
        entity:
          multiple: true
          domain:
            - binary_sensor
            - cover

    garage_mode:
      name: Garagenmodus
      description: >
        Steuert, wie Garagentore wirken (analog zum Türmodus, aber unabhängig
        einstellbar).
        "Garagentore ignorieren": keinerlei Wirkung.
        "Öffnung schaltet ein": Öffnen ist ein Einschaltimpuls, verhindert aber
        kein Ausschalten.
        "Offen hält Licht an": solange mindestens ein Garagentor offen ist, wird
        nicht ausgeschaltet (Öffnen schaltet zusätzlich ein).
      default: "hold_while_open"
      selector:
        select:
          mode: dropdown
          options:
            - label: "Garagentore ignorieren"
              value: "none"
            - label: "Öffnung schaltet ein"
              value: "trigger_on_open"
            - label: "Offen hält Licht an"
              value: "hold_while_open"

    lux_sensor:
      name: Luxsensor (optional)
      description: >
        Helligkeitssensor zur Dämmerungsprüfung. Optional: leer / unknown /
        unavailable deaktiviert die Luxprüfung automatisch. Alternativ den
        Dämmerungswert auf 0 setzen (Luxprüfung aus).
      default: ""
      selector:
        entity:
          domain: sensor

    darkness_sensors:
      name: Dämmerungssensor(en) (optional)
      description: >
        Optional. Binärsensor(en), die bei Dunkelheit "an" melden
        (Mehrfachauswahl; z. B. Template-Sensor auf Sonnenstand,
        Dämmerungsschalter, input_boolean oder Zeitplan-Helfer). Meldet
        mindestens einer "an", gilt es als dunkel. ODER-verknüpft mit dem
        Luxsensor: dunkel genug, wenn Lux <= Schwellwert ODER ein
        Dämmerungssensor an ist. Leer / unknown / unavailable werden
        ignoriert; sind alle Sensoren ungültig und ist kein Luxsensor aktiv,
        ist die Dunkelheitsprüfung deaktiviert. Hellwerden (an -> aus)
        schaltet das Licht NICHT aus.
      default: []
      selector:
        entity:
          multiple: true
          domain:
            - binary_sensor
            - input_boolean
            - schedule

    light_target:
      name: Licht / Schalter
      description: Ziel-Licht(er) oder Schalter, die geschaltet werden.
      selector:
        target:
          entity:
            domain:
              - light
              - switch

    presence_entity:
      name: Anwesenheit Person / Gruppe / Helper
      description: Muss home/on/present/detected sein, sonst geht kein Licht an.
      selector:
        entity:

    lux_threshold:
      name: Dämmerungswert
      description: >
        Licht schaltet nur ein, wenn Lux kleiner/gleich diesem Wert ist.
        Wert 0 deaktiviert die Luxprüfung komplett. Ist kein Luxsensor gesetzt
        (oder liefert er unknown/unavailable), wird die Luxprüfung ebenfalls
        übersprungen.
      default: 30
      selector:
        number:
          min: 0
          max: 1000
          step: 1
          unit_of_measurement: lx

    off_delay:
      name: Ausschaltzeit nach keiner Präsenz
      description: Verzögerung, nach der das Licht bei fehlender Präsenz ausgeht.
      default:
        minutes: 2
      selector:
        duration:

    bypass_helper:
      name: Bypass Helper (optional)
      description: >
        Optional. Wenn EIN, macht die Automation nichts (weder Ein- noch
        Ausschalten). Leer lassen, wenn nicht benötigt. Normalerweise genau
        einen Helfer auswählen. WICHTIG: NICHT denselben Helfer wie für
        Sofort-An verwenden und KEINEN Raum-Deaktivieren-Helper als Dummy
        missbrauchen.
      default: []
      selector:
        entity:
          multiple: true
          domain: input_boolean

    instant_on_helper:
      name: Sofort-An ohne Timer Helper (optional)
      description: >
        Optional. Wenn EIN, wird Licht sofort eingeschaltet (ignoriert
        Dunkelheit und Anwesenheit) und nicht automatisch ausgeschaltet. Leer lassen, wenn
        nicht benötigt. WICHTIG: NICHT denselben Helfer wie für Bypass verwenden.
      default: []
      selector:
        entity:
          multiple: true
          domain: input_boolean

mode: restart

variables:
  # --- Roh-Eingaben (statisch) ---
  mmwave_sensor: !input mmwave_sensor
  lux_sensor: !input lux_sensor
  presence_entity: !input presence_entity
  bypass_helper: !input bypass_helper
  instant_on_helper: !input instant_on_helper
  lux_threshold: !input lux_threshold
  darkness_sensors: !input darkness_sensors
  motion_sensors: !input motion_sensors
  door_sensors: !input door_sensors
  door_mode: !input door_mode
  garage_doors: !input garage_doors
  garage_mode: !input garage_mode

  # --- Abgeleitete Zustaende (Snapshot zur Trigger-Zeit) ---
  # Nur explizit 'on' gilt als aktiv. Leere Liste / unknown / unavailable -> nicht aktiv.
  bypass_active: >
    {{ expand(bypass_helper) | selectattr('state', 'eq', 'on') | list | count > 0 }}
  instant_on_active: >
    {{ expand(instant_on_helper) | selectattr('state', 'eq', 'on') | list | count > 0 }}
  motion_active: >
    {{ expand(motion_sensors) | selectattr('state', 'eq', 'on') | list | count > 0 }}
  # mmWave optional (Liste ODER – aus Alt-Configs – einzelne Entity). expand()
  # akzeptiert beides; leere Liste / leer -> count 0 -> nicht aktiv.
  mmwave_active: >
    {{ expand(mmwave_sensor) | selectattr('state', 'eq', 'on') | list | count > 0 }}
  door_open: >
    {{ door_mode != 'none'
       and (expand(door_sensors) | selectattr('state', 'eq', 'on') | list | count > 0) }}
  # Garagentor offen. Unterstuetzt cover ('open'/'opening') und binary_sensor ('on').
  garage_open: >
    {{ garage_mode != 'none'
       and (expand(garage_doors)
            | selectattr('state', 'in', ['on', 'open', 'opening'])
            | list | count > 0) }}
  activity_active: >
    {{ mmwave_active
       or motion_active
       or (door_mode == 'hold_while_open' and door_open)
       or (garage_mode == 'hold_while_open' and garage_open) }}
  # Dunkelheitspruefung (Snapshot). True = "dunkel genug bzw. Pruefung aus"
  # -> Einschalten erlaubt. ODER-Verknuepfung: Lux <= Schwelle ODER mindestens
  # ein Daemmerungssensor 'on'. Nicht konfigurierte bzw. unknown/unavailable
  # Quellen geben keine Stimme ab (Schwelle 0 = Lux aus); ist KEINE gueltige
  # Quelle konfiguriert, ist die Pruefung deaktiviert (immer erlaubt).
  darkness_ok: >
    {% set lux_configured = lux_threshold | float(0) > 0
       and lux_sensor not in [none, '', 'unknown', 'unavailable']
       and states(lux_sensor) not in ['unknown', 'unavailable', '', 'none'] %}
    {% set lux_dark = lux_configured
       and states(lux_sensor) | float(9999) <= lux_threshold | float(0) %}
    {% set dark_states = expand(darkness_sensors)
       | rejectattr('state', 'in', ['unknown', 'unavailable']) | list %}
    {% set sensor_dark = dark_states | selectattr('state', 'eq', 'on')
       | list | count > 0 %}
    {{ (not lux_configured and dark_states | count == 0)
       or lux_dark or sensor_dark }}

# trigger_variables werden – anders als variables: – bereits zur Trigger-Zeit
# gerendert und sind im Template-Trigger unten verfuegbar (variables: sind es
# NICHT). Nur fuer die Template-Trigger (lux_below, darkness_on) noetig.
trigger_variables:
  tv_lux_sensor: !input lux_sensor
  tv_lux_threshold: !input lux_threshold
  tv_mmwave_sensor: !input mmwave_sensor
  tv_darkness_sensors: !input darkness_sensors

triggers:
  # mmWave-Praesenz (optional; leere Liste => kein Trigger)
  - trigger: state
    entity_id: !input mmwave_sensor
    to: "on"
    id: mmwave_on
  - trigger: state
    entity_id: !input mmwave_sensor
    from: "on"
    to: "off"
    id: mmwave_off

  # Lux faellt unter Schwelle, WAEHREND mmWave bereits 'on' ist.
  # Zweck: bei Daemmerung einschalten, auch wenn kein neues Bewegungsevent kommt
  # (stehende Praesenz). Als Template-Trigger umgesetzt, weil ein numeric_state-
  # Trigger auf den optionalen Luxsensor bei leerem Feld (entity_id "") die
  # Automation kaputt machen wuerde. Feuert nur beim Uebergang false->true.
  # Bedingungen: Luxsensor gesetzt + gueltiger Wert, Schwelle > 0, Wert <=
  # Schwelle UND mindestens ein mmWave-Sensor on. Die mmWave-on-Bedingung sorgt
  # dafuer, dass der Trigger waehrend eines laufenden Ausschalt-Delays (mmWave
  # off) NICHT feuert und diesen somit nicht per restart abbricht. Ohne
  # mmWave-Sensor (leere Liste) feuert dieser Trigger nie.
  - trigger: template
    value_template: >
      {{ tv_lux_threshold | float(0) > 0
         and tv_lux_sensor not in [none, '', 'unknown', 'unavailable']
         and states(tv_lux_sensor) not in ['unknown', 'unavailable', '', 'none']
         and states(tv_lux_sensor) | float(9999) <= tv_lux_threshold | float(0)
         and (expand(tv_mmwave_sensor) | selectattr('state', 'eq', 'on')
              | list | count > 0) }}
    id: lux_below

  # Daemmerungssensor wird 'on', WAEHREND mmWave bereits 'on' ist (analog
  # lux_below): bei Daemmerung einschalten, auch ohne neues Bewegungsevent
  # (stehende Praesenz). Der mmWave-Guard sorgt dafuer, dass der Trigger
  # waehrend eines laufenden Ausschalt-Delays (mmWave off) NICHT feuert und
  # diesen somit nicht per restart abbricht. Ohne Daemmerungssensor (leere
  # Liste) feuert dieser Trigger nie.
  - trigger: template
    value_template: >
      {{ (expand(tv_darkness_sensors) | selectattr('state', 'eq', 'on')
          | list | count > 0)
         and (expand(tv_mmwave_sensor) | selectattr('state', 'eq', 'on')
              | list | count > 0) }}
    id: darkness_on

  # Bewegungsmelder (optional; leere Liste => kein Trigger)
  - trigger: state
    entity_id: !input motion_sensors
    to: "on"
    id: motion_on
  - trigger: state
    entity_id: !input motion_sensors
    from: "on"
    to: "off"
    id: motion_off

  # Sofort-An-Helfer (optional; leere Liste => kein Trigger)
  - trigger: state
    entity_id: !input instant_on_helper
    to: "on"
    id: instant_on
  - trigger: state
    entity_id: !input instant_on_helper
    to: "off"
    id: instant_off

  # Bypass-Helfer (optional; leere Liste => kein Trigger)
  - trigger: state
    entity_id: !input bypass_helper
    to: "on"
    id: bypass_on
  - trigger: state
    entity_id: !input bypass_helper
    to: "off"
    id: bypass_off

  # Tuerkontakte (optional; Wirkung haengt vom Tuermodus ab)
  - trigger: state
    entity_id: !input door_sensors
    from: "off"
    to: "on"
    id: door_open
  - trigger: state
    entity_id: !input door_sensors
    from: "on"
    to: "off"
    id: door_closed

  # Garagentore (optional; Wirkung haengt vom Garagenmodus ab).
  # Mit Zustands-Liste, damit sowohl cover (open/opening/closed) als auch
  # binary_sensor (on/off) sauber erfasst werden. not_from verhindert, dass
  # ein Geraete-Reconnect (unavailable/unknown -> Zustand) faelschlich als
  # Oeffnen/Schliessen gewertet wird.
  - trigger: state
    entity_id: !input garage_doors
    not_from:
      - "unknown"
      - "unavailable"
    to:
      - "on"
      - "open"
      - "opening"
    id: garage_open
  - trigger: state
    entity_id: !input garage_doors
    not_from:
      - "unknown"
      - "unavailable"
    to:
      - "off"
      - "closed"
    id: garage_closed

conditions:
  # Bypass an: Automation blockieren.
  # Ausnahme: bypass_off muss durchlaufen, damit nach Ende des Bypass neu bewertet wird.
  - condition: template
    value_template: "{{ trigger.id == 'bypass_off' or not bypass_active }}"

actions:
  - choose:
      # ============================================================
      # BYPASS AUS -> Neubewertung
      # Wenn Aktivitaet vorhanden ist: ggf. einschalten.
      # Wenn keine Aktivitaet vorhanden ist: ausschalten.
      # ============================================================
      - conditions:
          - condition: trigger
            id: bypass_off
          # Multi-Helper-Schutz: ist ein ANDERER Bypass-Helfer noch 'on',
          # bleibt die Automation blockiert (keine Neubewertung).
          - condition: template
            value_template: "{{ not bypass_active }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ not instant_on_active }}"
                  - condition: template
                    value_template: "{{ activity_active }}"
                  - condition: template
                    value_template: >
                      {{ states(presence_entity) in ['home', 'on', 'present', 'detected'] }}
                  - condition: template
                    value_template: "{{ darkness_ok }}"
                sequence:
                  - action: homeassistant.turn_on
                    target: !input light_target
            default:
              - condition: template
                value_template: "{{ not instant_on_active and not activity_active }}"
              - action: homeassistant.turn_off
                target: !input light_target

      # ============================================================
      # EINSCHALTEN
      # Quellen: mmWave on, Bewegungsmelder on, Sofort-An on, Tueroeffnung
      # (wenn Tuermodus erlaubt), Garagenoeffnung (wenn Garagenmodus erlaubt)
      # oder es wird dunkel bei stehender mmWave-Praesenz (lux_below /
      # darkness_on).
      # ============================================================
      - conditions:
          - condition: trigger
            id:
              - mmwave_on
              - motion_on
              - instant_on
              - door_open
              - garage_open
              - lux_below
              - darkness_on
          # Anwesenheit (Sofort-An ignoriert Anwesenheit)
          - condition: template
            value_template: >
              {{ trigger.id == 'instant_on'
                 or states(presence_entity) in ['home', 'on', 'present', 'detected'] }}
          # Aktivitaetsquelle vorhanden
          - condition: template
            value_template: >
              {{ trigger.id == 'instant_on'
                 or mmwave_active
                 or motion_active
                 or (door_mode in ['trigger_on_open', 'hold_while_open']
                     and trigger.id == 'door_open')
                 or (garage_mode in ['trigger_on_open', 'hold_while_open']
                     and trigger.id == 'garage_open') }}
          # Dunkelheit (Sofort-An ignoriert sie; keine gueltige Quelle
          # konfiguriert -> Pruefung deaktiviert)
          - condition: template
            value_template: "{{ trigger.id == 'instant_on' or darkness_ok }}"
        sequence:
          - action: homeassistant.turn_on
            target: !input light_target

      # ============================================================
      # AUSSCHALTEN MIT DELAY
      # Quellen: mmWave off, Bewegungsmelder off, Tuer/Garage geschlossen.
      # Vor-Pruefung (Snapshot) verhindert unnoetige Timer; nach dem
      # Delay werden ALLE relevanten Zustaende LIVE neu geprueft.
      # ============================================================
      - conditions:
          - condition: trigger
            id:
              - mmwave_off
              - motion_off
              - door_closed
              - garage_closed
          - condition: template
            value_template: "{{ not instant_on_active }}"
          - condition: template
            value_template: "{{ not activity_active }}"
        sequence:
          - delay: !input off_delay
          # LIVE-Neubewertung nach dem Delay (Variablen oben sind Trigger-Zeit-Snapshots!)
          - variables:
              bypass_now: >
                {{ expand(bypass_helper) | selectattr('state', 'eq', 'on') | list | count > 0 }}
              instant_now: >
                {{ expand(instant_on_helper) | selectattr('state', 'eq', 'on') | list | count > 0 }}
              mmwave_now_on: >
                {{ expand(mmwave_sensor) | selectattr('state', 'eq', 'on') | list | count > 0 }}
              motion_now: >
                {{ expand(motion_sensors) | selectattr('state', 'eq', 'on') | list | count > 0 }}
              door_hold_now: >
                {{ door_mode == 'hold_while_open'
                   and (expand(door_sensors) | selectattr('state', 'eq', 'on') | list | count > 0) }}
              garage_hold_now: >
                {{ garage_mode == 'hold_while_open'
                   and (expand(garage_doors)
                        | selectattr('state', 'in', ['on', 'open', 'opening'])
                        | list | count > 0) }}
          - condition: template
            value_template: >
              {{ not bypass_now and not instant_now and not mmwave_now_on
                 and not motion_now and not door_hold_now and not garage_hold_now }}
          - action: homeassistant.turn_off
            target: !input light_target

      # ============================================================
      # SOFORT-AN AUS -> ggf. sofort ausschalten (ohne Delay),
      # sofern keine andere Aktivitaet das Licht haelt.
      # ============================================================
      - conditions:
          - condition: trigger
            id: instant_off
          # Multi-Helper-Schutz: ist ein ANDERER Sofort-An-Helfer noch 'on',
          # wird NICHT ausgeschaltet.
          - condition: template
            value_template: "{{ not instant_on_active }}"
          - condition: template
            value_template: "{{ not activity_active }}"
        sequence:
          - action: homeassistant.turn_off
            target: !input light_target
