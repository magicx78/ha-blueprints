blueprint:
  name: Bluepoint mmWave Licht mit Lux, Anwesenheit, Timer und Bypass
  description: >
    Lichtsteuerung mit mmWave-Praesenzsensor, Luxwert, Anwesenheit,
    Ausschalt-Timer, Bypass und Sofort-An ohne Timer.
    Das Licht schaltet nur ein, wenn jemand anwesend ist und es dunkel genug
    ist (Lux <= Schwellwert). Ueber den Sofort-An-Helfer kann das Licht
    unabhaengig von Lux und Anwesenheit eingeschaltet und vom automatischen
    Ausschalten ausgenommen werden. Ein Bypass-Helfer deaktiviert die
    Automation komplett.

    Bypass-Helfer und Sofort-An-Helfer sind OPTIONAL: ohne Helfer laeuft die
    Automation normal ueber mmWave/Lux/Anwesenheit.

    Hinweise:
    - Daemmerungswert 0 deaktiviert die Luxpruefung (Raeume ohne brauchbaren
      Luxsensor: Luxsensor leer lassen UND Daemmerungswert auf 0 setzen).
    - Bypass und Sofort-An duerfen NICHT denselben Helfer verwenden
      (die Bedeutungen widersprechen sich).
    - Keinen vorhandenen Raum-Deaktivieren-Helper als Dummy missbrauchen,
      sonst werden andere Raeume versehentlich beeinflusst.
  domain: automation
  author: "magicx78"
  homeassistant:
    min_version: "2024.10.0"

  input:
    mmwave_sensor:
      name: mmWave Präsenzsensor
      description: Binary Sensor des mmWave-/Präsenzmelders.
      selector:
        entity:
          domain: binary_sensor

    lux_sensor:
      name: Luxsensor (optional)
      description: >
        Helligkeitssensor zur Dämmerungsprüfung. Optional: ohne Luxsensor das
        Feld leer lassen UND den Dämmerungswert auf 0 setzen (Luxprüfung aus).
      default: ""
      selector:
        entity:
          domain: sensor

    light_target:
      name: Licht / Schalter
      description: Ziel-Licht(er) oder Schalter, die geschaltet werden.
      selector:
        target:
          entity:
            domain:
              - light
              - switch

    presence_entity:
      name: Anwesenheit Person / Gruppe / Helper
      description: Muss home/on/present sein, sonst geht kein Licht an.
      selector:
        entity:

    lux_threshold:
      name: Dämmerungswert
      description: >
        Licht schaltet nur ein, wenn Lux kleiner/gleich diesem Wert ist.
        Wert 0 deaktiviert die Luxprüfung komplett.
      default: 30
      selector:
        number:
          min: 0
          max: 1000
          step: 1
          unit_of_measurement: lx

    off_delay:
      name: Ausschaltzeit nach keiner Präsenz
      description: Verzögerung, nach der das Licht bei fehlender Präsenz ausgeht.
      default:
        minutes: 2
      selector:
        duration:

    bypass_helper:
      name: Bypass Helper (optional)
      description: >
        Optional. Wenn EIN, macht die Automation nichts (weder Ein- noch
        Ausschalten). Leer lassen, wenn nicht benötigt. WICHTIG: NICHT denselben
        Helfer wie für Sofort-An verwenden und KEINEN Raum-Deaktivieren-Helper
        als Dummy missbrauchen.
      default: ""
      selector:
        entity:
          domain: input_boolean

    instant_on_helper:
      name: Sofort-An ohne Timer Helper (optional)
      description: >
        Optional. Wenn EIN, wird Licht sofort eingeschaltet (ignoriert Lux und
        Anwesenheit) und nicht automatisch ausgeschaltet. Leer lassen, wenn
        nicht benötigt; ein Helfer genügt. WICHTIG: NICHT denselben Helfer wie
        für Bypass verwenden.
      default: []
      selector:
        entity:
          multiple: true
          domain: input_boolean

mode: restart

variables:
  mmwave_sensor: !input mmwave_sensor
  lux_sensor: !input lux_sensor
  presence_entity: !input presence_entity
  bypass_helper: !input bypass_helper
  instant_on_helper: !input instant_on_helper
  lux_threshold: !input lux_threshold

triggers:
  - trigger: state
    entity_id: !input mmwave_sensor
    to: "on"
    id: motion_on

  - trigger: state
    entity_id: !input mmwave_sensor
    to: "off"
    id: motion_off

  - trigger: state
    entity_id: !input instant_on_helper
    to: "on"
    id: instant_on

  - trigger: state
    entity_id: !input instant_on_helper
    to: "off"
    id: instant_off

conditions:
  # Bypass: blockiert nur, wenn ein echter Helfer existiert und explizit 'on' ist.
  # Fehlender / leerer / unavailable Helfer blockiert NICHT.
  - condition: template
    value_template: "{{ not is_state(bypass_helper, 'on') }}"

actions:
  - choose:
      - conditions:
          - condition: trigger
            id:
              - motion_on
              - instant_on
          - condition: template
            value_template: >
              {{ trigger.id == 'instant_on' or states(presence_entity) in ['home', 'on', 'present', 'detected'] }}
          - condition: template
            value_template: >
              {{ trigger.id == 'instant_on' or lux_threshold | float <= 0 or states(lux_sensor) | float(9999) <= lux_threshold | float }}
        sequence:
          - action: homeassistant.turn_on
            target: !input light_target

      - conditions:
          - condition: trigger
            id: motion_off
          # Instant-On NICHT aktiv (leere Liste / unavailable => nicht aktiv)
          - condition: template
            value_template: >
              {{ expand(instant_on_helper) | selectattr('state', 'eq', 'on') | list | count == 0 }}
        sequence:
          - delay: !input off_delay
          - condition: template
            value_template: "{{ is_state(mmwave_sensor, 'off') }}"
          # Live-Neuprüfung nach dem Delay (kein vorberechnetes Variable!)
          - condition: template
            value_template: >
              {{ expand(instant_on_helper) | selectattr('state', 'eq', 'on') | list | count == 0 }}
          - action: homeassistant.turn_off
            target: !input light_target

      - conditions:
          - condition: trigger
            id: instant_off
          - condition: template
            value_template: "{{ is_state(mmwave_sensor, 'off') }}"
        sequence:
          - action: homeassistant.turn_off
            target: !input light_target
